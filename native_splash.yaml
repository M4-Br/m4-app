flutter_native_splash:
  # Imagem principal (para Android antigo e iOS)
  image: assets/images/yooconn.png
  color: "#FFFFFF"

  # AJUSTE 1: Garante que no Android antigo e iOS a imagem fique no centro sem esticar
  android_gravity: center
  ios_content_mode: center

  # AJUSTE 2: Configuração específica para Android 12+ (Onde ocorre a "bola")
  android_12:
    image: assets/images/yooconn.png
    
    # A cor de fundo da tela
    color: "#FFFFFF"
    
    # IMPORTANTE: A cor de fundo DA BOLA (ícone). 
    # Deve ser a mesma do fundo para parecer que a imagem está flutuando livremente.
    icon_background_color: "#FFFFFF"